name: urbanbloom-dev
services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-urbanbloom}
      POSTGRES_USER: ${DB_USER:-urbanbloom}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      TZ: Europe/Berlin
      PGPORT: ${DB_PORT:-5432}
    ports:
      - "${DB_PORT:-5432}:${DB_PORT:-5432}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-urbanbloom} -p ${DB_PORT:-5432}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - urbanbloom-network

  # Keycloak Identity Provider
  keycloak:
    image: keycloak/keycloak:26.4.7
    restart: unless-stopped
    volumes:
      - ./config/keycloak/themes:/opt/keycloak/themes:ro
      - ./config/keycloak:/opt/keycloak/data/import:ro
    environment:
      TZ: Europe/Berlin
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-urbanbloom}
      KC_DB_USERNAME: ${DB_USER:-urbanbloom}
      KC_DB_PASSWORD: ${DB_PASSWORD:-secret}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: 8081
      KC_IMPORT: /opt/keycloak/data/import/
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["start-dev", "--import-realm"]
    healthcheck:
      test: ["CMD-SHELL", "timeout 10s bash -c ':> /dev/tcp/127.0.0.1/8081' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - urbanbloom-network

  # Mailpit for local email testing
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025" # UI
      - "1025:1025" # SMTP
    networks:
      - urbanbloom-network

volumes:
  postgres_data:

networks:
  urbanbloom-network:
    driver: bridge
