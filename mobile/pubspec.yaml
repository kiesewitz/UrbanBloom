name: urban_bloom_mobile
description: "UrbanBloom mobile app for documenting and gamifying environmental actions"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management & routing
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.6.2

  # Storage (SQLite with Drift)
  drift: ^2.20.2
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.25
  path_provider: ^2.1.4
  path: ^1.9.0

  # Networking
  dio: ^5.7.0
  json_annotation: ^4.9.0

  # Utils
  flutter_secure_storage: ^9.2.2
  intl: ^0.19.0
  image_picker: ^1.1.2
  geolocator: ^13.0.1
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.5
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Code generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.2
  drift_dev: ^2.20.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
